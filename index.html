<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포트폴리오 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#080c14; --surface:#0d1520; --border:rgba(0,180,216,0.12);
    --teal:#00b4d8; --teal-dim:rgba(0,180,216,0.15);
    --green:#06d6a0; --red:#ef476f; --yellow:#ffd166;
    --purple:#9b5de5; --pink:#f15bb5;
    --white:#e8f4f8; --gray:#4a6580;
    --font-display:'Syne',sans-serif; --font-mono:'DM Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--white);font-family:var(--font-display);min-height:100vh;overflow-x:hidden;font-size:16px;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,180,216,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,180,216,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
  .container{max-width:1400px;margin:0 auto;padding:36px 28px;position:relative;z-index:1;}
  header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:44px;padding-bottom:24px;border-bottom:1px solid var(--border);}
  .header-left h1{font-size:2.4rem;font-weight:800;letter-spacing:-0.03em;}
  .header-left h1 span{color:var(--teal);}
  .header-meta{font-family:var(--font-mono);font-size:0.8rem;color:var(--gray);margin-top:8px;letter-spacing:0.05em;}
  .refresh-btn{background:var(--teal-dim);border:1px solid var(--teal);color:var(--teal);font-family:var(--font-mono);font-size:0.85rem;padding:10px 20px;cursor:pointer;letter-spacing:0.08em;transition:all 0.2s;}
  .refresh-btn:hover{background:var(--teal);color:var(--bg);}
  .section-title{font-size:0.78rem;font-family:var(--font-mono);color:var(--gray);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:10px;}
  .section-title::after{content:'';flex:1;height:1px;background:var(--border);}

  /* KPI */
  .kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:36px;}
  .kpi-card{background:var(--surface);border:1px solid var(--border);padding:24px 20px;position:relative;overflow:hidden;}
  .kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent-color,var(--teal));}
  .kpi-label{font-family:var(--font-mono);font-size:0.72rem;color:var(--gray);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:12px;}
  .kpi-value{font-size:1.7rem;font-weight:700;letter-spacing:-0.02em;color:var(--accent-color,var(--teal));line-height:1;}
  .kpi-sub{font-family:var(--font-mono);font-size:0.72rem;color:var(--gray);margin-top:8px;}

  /* 메인 그리드 */
  .main-grid{display:grid;grid-template-columns:1fr 360px;gap:20px;margin-bottom:20px;}
  .treemap-container{background:var(--surface);border:1px solid var(--border);padding:22px;}
  #treemap{width:100%;height:380px;position:relative;overflow:hidden;}
  .treemap-cell{position:absolute;display:flex;flex-direction:column;justify-content:center;align-items:center;cursor:pointer;transition:filter 0.15s;overflow:hidden;border:2px solid var(--bg);}
  .treemap-cell:hover{filter:brightness(1.2);z-index:10;}
  .treemap-cell-name{font-size:0.85rem;font-weight:600;text-align:center;padding:0 8px;line-height:1.3;color:rgba(255,255,255,0.95);text-shadow:0 1px 4px rgba(0,0,0,0.5);}
  .treemap-cell-pct{font-family:var(--font-mono);font-size:0.95rem;margin-top:4px;color:rgba(255,255,255,0.9);text-shadow:0 1px 4px rgba(0,0,0,0.5);}
  .treemap-cell-amt{font-family:var(--font-mono);font-size:0.68rem;margin-top:3px;color:rgba(255,255,255,0.65);}

  /* 우측 패널 */
  .right-panel{display:flex;flex-direction:column;gap:16px;}
  .panel-card{background:var(--surface);border:1px solid var(--border);padding:20px;}

  /* 게이지 */
  .gauge-item{margin-bottom:18px;}
  .gauge-item:last-child{margin-bottom:0;}
  .gauge-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
  .gauge-label{font-size:0.8rem;color:var(--gray);font-family:var(--font-mono);}
  .gauge-nums{font-family:var(--font-mono);font-size:0.78rem;}
  .gauge-bar-bg{height:7px;background:rgba(255,255,255,0.06);overflow:hidden;}
  .gauge-bar-fill{height:100%;transition:width 1s cubic-bezier(0.4,0,0.2,1);}

  /* 자녀 및 기타 자산 */
  .child-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);}
  .child-row:last-child{border-bottom:none;padding-bottom:0;}
  .child-name{font-size:0.92rem;font-weight:600;color:var(--pink);}
  .child-gift{font-family:var(--font-mono);font-size:0.68rem;color:var(--gray);margin-top:3px;}
  .child-stats{display:flex;gap:18px;}
  .child-stat{text-align:right;}
  .child-stat-label{font-family:var(--font-mono);font-size:0.65rem;color:var(--gray);display:block;}
  .child-stat-value{font-family:var(--font-mono);font-size:0.88rem;font-weight:500;}

  /* 하단 그리드 */
  .bottom-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
  .panel-box{background:var(--surface);border:1px solid var(--border);padding:22px;}

  /* 배당 */
  .dividend-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;}
  .div-kpi{background:#0a1825;border:1px solid rgba(6,214,160,0.15);padding:16px;text-align:center;}
  .div-kpi-label{font-family:var(--font-mono);font-size:0.68rem;color:var(--gray);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;}
  .div-kpi-value{font-family:var(--font-mono);font-size:1.2rem;font-weight:600;color:var(--green);}

  /* 테이블 공통 */
  .t-row{display:grid;gap:8px;align-items:center;padding:11px 0;border-bottom:1px solid rgba(0,180,216,0.06);font-family:var(--font-mono);font-size:0.8rem;}
  .t-row:last-child{border-bottom:none;}
  .t-row.hdr{color:var(--gray);font-size:0.72rem;padding-bottom:10px;}
  .t-name{font-size:0.85rem;font-weight:600;font-family:var(--font-display);}

  .alloc-row{grid-template-columns:1fr 90px 70px 70px 70px;}
  .hold-row{grid-template-columns:1fr 60px 95px 85px 75px;}
  .hist-row{grid-template-columns:90px 1fr 1fr 1fr 75px;}
  .div-row{grid-template-columns:95px 1fr 70px 90px 60px;}

  /* 유틸 */
  .pos{color:var(--green);} .neg{color:var(--red);} .neu{color:var(--gray);}
  .badge{font-family:var(--font-mono);font-size:0.65rem;padding:2px 8px;letter-spacing:0.05em;}
  .acct-연금저축{background:rgba(255,209,102,0.12);color:var(--yellow);}
  .acct-ISA{background:rgba(155,93,229,0.15);color:var(--purple);}
  .acct-IRP{background:rgba(0,180,216,0.12);color:var(--teal);}
  .acct-일반{background:rgba(6,214,160,0.12);color:var(--green);}

  /* 로딩 */
  .loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px;}
  .loading-text{font-family:var(--font-mono);color:var(--teal);font-size:0.9rem;letter-spacing:0.1em;animation:pulse 1.2s ease-in-out infinite;}
  .loading-bar{width:200px;height:2px;background:rgba(0,180,216,0.15);overflow:hidden;}
  .loading-bar-fill{height:100%;background:var(--teal);animation:loadbar 1.5s ease-in-out infinite;}
  @keyframes loadbar{0%{width:0%;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0%;margin-left:100%}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .fade-in{animation:fadeIn 0.4s ease forwards;}
  .error-msg{background:rgba(239,71,111,0.1);border:1px solid rgba(239,71,111,0.3);color:var(--red);padding:16px 20px;font-family:var(--font-mono);font-size:0.82rem;margin-bottom:20px;line-height:1.7;}

  @media(max-width:1000px){
    .kpi-grid{grid-template-columns:repeat(3,1fr);}
    .main-grid,.bottom-grid{grid-template-columns:1fr;}
    .dividend-grid{grid-template-columns:repeat(2,1fr);}
  }
</style>
</head>
<body>
<div class="loading-overlay" id="loading">
  <div class="loading-text">LOADING PORTFOLIO DATA</div>
  <div class="loading-bar"><div class="loading-bar-fill"></div></div>
</div>

<div class="container" id="app" style="display:none">
  <header>
    <div class="header-left">
      <h1>포트폴리오 <span>대시보드</span></h1>
      <div class="header-meta" id="last-updated">데이터 로딩 중...</div>
    </div>
    <button class="refresh-btn" onclick="loadAll()">↺ 새로고침</button>
  </header>
  <div id="error-area"></div>

  <div class="section-title">OVERVIEW</div>
  <div class="kpi-grid">
    <div class="kpi-card" style="--accent-color:var(--teal)"><div class="kpi-label">총 자산</div><div class="kpi-value" id="kpi-total">-</div><div class="kpi-sub" id="kpi-total-sub"></div></div>
    <div class="kpi-card" style="--accent-color:var(--red)"><div class="kpi-label">총 부채</div><div class="kpi-value" id="kpi-debt">-</div><div class="kpi-sub" id="kpi-debt-sub"></div></div>
    <div class="kpi-card" style="--accent-color:var(--green)"><div class="kpi-label">순 자산</div><div class="kpi-value" id="kpi-net">-</div><div class="kpi-sub" id="kpi-net-sub"></div></div>
    <div class="kpi-card" style="--accent-color:var(--yellow)"><div class="kpi-label">평가 수익</div><div class="kpi-value" id="kpi-profit">-</div><div class="kpi-sub" id="kpi-profit-sub"></div></div>
    <div class="kpi-card" style="--accent-color:var(--purple)"><div class="kpi-label">총 수익률</div><div class="kpi-value" id="kpi-ret">-</div><div class="kpi-sub" id="kpi-ret-sub"></div></div>
    <div class="kpi-card" style="--accent-color:var(--green)"><div class="kpi-label">배당 포함 수익률</div><div class="kpi-value" id="kpi-total-ret">-</div><div class="kpi-sub" id="kpi-total-ret-sub"></div></div>
  </div>

  <div class="main-grid">
    <div class="treemap-container">
      <div class="section-title">종목 비중 트리맵</div>
      <div id="treemap"></div>
    </div>
    <div class="right-panel">
      <div class="panel-card"><div class="section-title">납입 한도</div><div id="gauge-area"></div></div>
      <div class="panel-card"><div class="section-title">기타 자산</div><div id="other-assets-area"></div></div>
      <div class="panel-card"><div class="section-title">자녀 자산</div><div id="child-area"></div></div>
    </div>
  </div>

  <div class="bottom-grid">
    <div class="panel-box"><div class="section-title">계좌별 자산 구성</div><div id="alloc-area"></div></div>
    <div class="panel-box"><div class="section-title">보유 종목</div><div id="holdings-area"></div></div>
  </div>

  <div class="panel-box" style="margin-bottom:20px">
    <div class="section-title">배당금 현황</div>
    <div class="dividend-grid" id="div-kpi-area"></div>
    <div id="div-history-area"></div>
  </div>

  <div class="panel-box">
    <div class="section-title">분기별 순자산 추이</div>
    <div id="history-area"></div>
  </div>
</div>

<script>
const SHEET_ID='1_4hwJw3Br0buqkDJ4InBByBzDjlsbUAueL-u4B3ES7k';
function csvUrl(name){return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(name)}`;}
async function fetchCSV(name){const res=await fetch(csvUrl(name));if(!res.ok)throw new Error(`시트 로드 실패: ${name}`);return parseCSV(await res.text());}

function parseCSV(text){
  const rows=[];let row=[],cell='',inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(c==='"'){if(inQ&&text[i+1]==='"'){cell+='"';i++;}else inQ=!inQ;}
    else if(c===','&&!inQ){row.push(cell.trim());cell='';}
    else if((c==='\n'||c==='\r')&&!inQ){if(c==='\r'&&text[i+1]==='\n')i++;row.push(cell.trim());rows.push(row);row=[];cell='';}
    else cell+=c;
  }
  if(cell||row.length){row.push(cell.trim());rows.push(row);}
  return rows;
}

function num(s){const c=String(s||0).trim().replace(/^"|"$/g,'').replace(/[,\s₩원%+]/g,'').replace(/\.$/,'');return parseFloat(c)||0;}
function fmt(n,unit='원'){
  const a=Math.abs(n),sign=n<0?'-':'';
  if(a>=100000000)return sign+(a/100000000).toFixed(1)+'억'+unit;
  if(a>=10000)return sign+Math.round(a/10000)+'만'+unit;
  return n.toLocaleString()+unit;
}
function fmtPct(n){return(n>=0?'+':'')+n.toFixed(2)+'%';}

// 구글 스프레드시트 날짜 파서 (유연성 강화)
function parseDate(str) {
  if (!str) return null;
  const clean = String(str).replace(/"/g, '').trim();
  const noTrailingDot = clean.replace(/\.$/, '');
  const parts = noTrailingDot.split(/[-/.\s]+/).map(p => p.trim()).filter(Boolean);
  
  if (parts.length >= 2) {
    let y = '', m = '', d = '01';
    
    if (parts[0].length === 4 && !isNaN(parts[0])) {
      y = parts[0];
      m = parts[1];
      if (parts[2]) d = parts[2];
    } else if (parts[2] && parts[2].length === 4 && !isNaN(parts[2])) {
      y = parts[2];
      m = parts[0];
      d = parts[1];
    } else if (parts[1] && parts[1].length === 4 && !isNaN(parts[1])) {
      y = parts[1];
      m = parts[0];
      if (parts[2]) d = parts[2];
    } else if (parts[0].length === 2 && !isNaN(parts[0]) && parts[0] !== '00') {
      y = "20" + parts[0];
      m = parts[1];
      if (parts[2]) d = parts[2];
    }
    
    const yearNum = parseInt(y);
    const monthNum = parseInt(m);
    const dayNum = parseInt(d);
    
    if (yearNum >= 2000 && yearNum <= 2100 && monthNum >= 1 && monthNum <= 12) {
      return {
        yr: String(yearNum),
        mo: String(monthNum).padStart(2, '0'),
        dt: `${yearNum}-${String(monthNum).padStart(2, '0')}-${String(dayNum).padStart(2, '0')}`
      };
    }
  }
  return null;
}

// 이모지 variation selector나 공백에 구애받지 않는 안전한 섹션 감지기
function isSectionHeader(lbl) {
  if (!lbl) return false;
  return lbl.includes('연금저축') || 
         lbl.includes('IRP') || 
         lbl.includes('ISA') || 
         lbl.includes('기타자산') || 
         lbl.includes('자녀 증여') || 
         lbl.includes('환율');
}

// 트리맵 - slice-and-dice 방식 (안정적)
function buildTreemap(items, x, y, w, h) {
  if (!items.length) return [];
  if (items.length === 1) {
    return [{...items[0], x, y, w, h}];
  }
  const total = items.reduce((s, i) => s + i.value, 0);
  const rects = [];

  function slice(items, x, y, w, h, horiz) {
    if (!items.length) return;
    const total = items.reduce((s, i) => s + i.value, 0);
    let pos = horiz ? x : y;
    for (let i = 0; i < items.length; i++) {
      const item = items[i];
      const ratio = item.value / total;
      const size = (horiz ? w : h) * ratio;
      const last = i === items.length - 1;
      const cellSize = last ? (horiz ? (x + w - pos) : (y + h - pos)) : size;
      rects.push({
        ...item,
        x: horiz ? pos : x,
        y: horiz ? y : pos,
        w: horiz ? cellSize : w,
        h: horiz ? h : cellSize,
      });
      pos += cellSize;
    }
  }

  function bestSplit(items, w, h) {
    const total = items.reduce((s, i) => s + i.value, 0);
    let best = 1, bestScore = Infinity;
    let cumSum = 0;
    for (let i = 0; i < items.length - 1; i++) {
      cumSum += items[i].value;
      const r1 = cumSum / total;
      const r2 = 1 - r1;
      if (r1 === 0 || r2 === 0) continue;
      const horiz = w >= h;
      let score;
      if (horiz) {
        const w1 = w * r1, w2 = w * r2;
        const ar1 = Math.max(w1/h, h/w1);
        const ar2 = Math.max(w2/h, h/w2);
        score = Math.max(ar1, ar2);
      } else {
        const h1 = h * r1, h2 = h * r2;
        const ar1 = Math.max(w/h1, h1/w);
        const ar2 = Math.max(w/h2, h2/w);
        score = Math.max(ar1, ar2);
      }
      if (score < bestScore) { bestScore = score; best = i + 1; }
    }
    return best;
  }

  function layout(items, x, y, w, h, depth) {
    if (!items.length) return;
    if (items.length <= 2 || depth > 8) {
      slice(items, x, y, w, h, w >= h);
      return;
    }
    const split = bestSplit(items, w, h);
    const total = items.reduce((s, i) => s + i.value, 0);
    const r1 = items.slice(0, split).reduce((s, i) => s + i.value, 0) / total;
    const horiz = w >= h;
    if (horiz) {
      const w1 = w * r1;
      slice(items.slice(0, split), x, y, w1, h, false);
      layout(items.slice(split), x + w1, y, w - w1, h, depth + 1);
    } else {
      const h1 = h * r1;
      slice(items.slice(0, split), x, y, w, h1, true);
      layout(items.slice(split), x, y + h1, w, h - h1, depth + 1);
    }
  }

  layout(items, x, y, w, h, 0);
  return rects;
}

const COLORS=['#0077b6','#00b4d8','#4cc9f0','#9b5de5','#c77dff','#e9c46a','#06d6a0','#118ab2','#ffd166','#ef476f','#f15bb5','#48cae4'];
let allData={};

async function loadAll(){
  document.getElementById('loading').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('error-area').innerHTML='';
  try{
    const [port,jh,cr,debt,settings,snap,div]=await Promise.all([
      fetchCSV('📈 내포트폴리오'),
      fetchCSV('강주호'),
      fetchCSV('강채린'),
      fetchCSV('💳 부채관리'),
      fetchCSV('⚙️ 설정'),
      fetchCSV('📝 분기스냅샷'),
      fetchCSV('💰 배당기록'),
    ]);
    allData={port,jh,cr,debt,settings,snap,div};
    renderAll();
    document.getElementById('last-updated').textContent=`LAST UPDATED: ${new Date().toLocaleString('ko-KR')} · Google Sheets 연동`;
  }catch(e){
    document.getElementById('error-area').innerHTML=`<div class="error-msg">⚠ 데이터 로드 실패: ${e.message}<br>Google Sheets 공유 설정을 확인하세요 (링크 있는 모든 사용자 → 뷰어)</div>`;
  }
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='block';
}

// 설정 파싱
function parseSettings(){
  const cfg={};let sec='';
  for(const row of allData.settings){
    const lbl=(row[1]||'').trim(),val=(row[2]||'').trim();
    if(isSectionHeader(lbl)) sec=lbl;
    if(lbl&&val){cfg[lbl]=val;cfg[sec+'§'+lbl]=val;}
  }
  return cfg;
}

// 포트폴리오 파싱
function parsePort(usdKrw){
  const holdings=[];let hdr=false;
  for(const row of allData.port){
    if(row.some(c=>(c||'').replace(/"/g,'').trim()==='종목명/자산명')){hdr=true;continue;}
    if(!hdr)continue;
    const name=(row[1]||'').replace(/"/g,'').trim();
    if(!name)continue;
    const cat=(row[2]||'').trim(),acct=(row[3]||'').trim(),ccy=(row[4]||'KRW').trim();
    const avgP=num(row[5]),curP=num(row[6]),qty=num(row[7]);
    const fx=ccy==='USD'?usdKrw:1;
    const buy=avgP*qty*fx,eval_=curP*qty*fx;
    if(eval_===0&&buy===0)continue;
    holdings.push({name,cat,acct,ccy,avgP,curP,qty,buy,eval:eval_,pnl:eval_-buy,ret:buy>0?(eval_-buy)/buy:0});
  }
  return holdings;
}

// 자녀 시트 파싱
function parseChild(rows,usdKrw,label){
  const holdings=[];let hdr=false;
  for(const row of rows){
    if((row[1]||'')==='종목명'){hdr=true;continue;}
    if(!hdr||!row[1])continue;
    const ccy=row[3]||'KRW',fx=ccy==='USD'?usdKrw:1;
    const avgP=num(row[4]),curP=num(row[5]),qty=num(row[6]);
    const buy=avgP*qty*fx,eval_=curP*qty*fx;
    if(eval_===0&&buy===0)continue;
    holdings.push({buy,eval:eval_});
  }
  const te=holdings.reduce((s,h)=>s+h.eval,0);
  const tb=holdings.reduce((s,h)=>s+h.buy,0);
  return{label,eval:te,buy:tb,ret:tb>0?(te-tb)/tb:0};
}

// 배당기록 시트 파싱 (강력한 정합성 및 자동 복구 시스템 탑재)
function parseDividends() {
  const records = [];
  let colDt = -1, colName = -1, colAcct = -1, colAmt = -1;

  for (const row of allData.div) {
    if (colDt === -1) {
      const hi = row.findIndex(c => (c || '').trim().includes('배당일'));
      if (hi !== -1) {
        colDt = hi;
        row.forEach((c, i) => {
          const v = (c || '').trim();
          if (v.includes('종목')) colName = i;
          if (v.includes('계좌')) colAcct = i;
          if (v.includes('배당금') || v.includes('금액')) colAmt = i;
        });
      }
      continue;
    }

    const dtRaw = (row[colDt] || '').trim();
    const parsedDate = parseDate(dtRaw);
    if (!parsedDate) continue; 

    const amt = num(colAmt !== -1 ? row[colAmt] : (row[colDt + 3] || ''));
    if (amt === 0) continue; 

    const name = (colName !== -1 ? (row[colName] || '') : (row[colDt + 1] || '')).trim();
    const acct = (colAcct !== -1 ? (row[colAcct] || '') : (row[colDt + 2] || '')).trim() || 'ISA';

    records.push({
      dt: parsedDate.dt,
      yr: parsedDate.yr,
      mo: parsedDate.mo,
      name,
      acct,
      amt
    });
  }

  // Fallback 플랜 작동
  if (records.length === 0) {
    for (const row of allData.div) {
      const dtRaw = (row[1] || '').trim();
      const parsedDate = parseDate(dtRaw);
      if (!parsedDate) continue;

      const amt = num(row[4] || row[5] || row[3]);
      if (amt === 0) continue;

      const name = (row[2] || '').trim();
      const acct = (row[3] || 'ISA').trim();

      records.push({
        dt: parsedDate.dt,
        yr: parsedDate.yr,
        mo: parsedDate.mo,
        name,
        acct,
        amt
      });
    }
  }

  return records;
}

function renderAll(){
  const cfg=parseSettings();
  const usdKrw=num(cfg['USD/KRW 환율']||'1380');

  const holdings=parsePort(usdKrw);
  const portfolioEval=holdings.reduce((s,h)=>s+h.eval,0);
  const totalBuy=holdings.reduce((s,h)=>s+h.buy,0);
  const totalPnl=portfolioEval-totalBuy;
  const totalRet=totalBuy>0?totalPnl/totalBuy:0;

  // 부채 파싱
  let totalDebt=0,monthlyInt=0;let dHdr=false;
  for(const row of allData.debt){
    if((row[1]||'')==='부채명'){dHdr=true;continue;}
    if(!dHdr||!row[1])continue;
    totalDebt+=num(row[6]);monthlyInt+=num(row[8]);
  }

  // 🏠 기타 자산 파싱 (집, 자동차 등) - 안전한 includes 매칭 시스템 적용
  let otherAssetEval = 0;
  const otherAssetsList = [];
  let inOtherAssets = false;
  for(const row of allData.settings){
    const lbl=(row[1]||'').trim(), val=(row[2]||'').trim(), note=(row[4]||'').trim();
    if(lbl.includes('기타자산')){
      inOtherAssets = true;
      continue;
    }
    // 다른 섹션을 만나면 파싱 중지
    if(inOtherAssets && isSectionHeader(lbl)){
      inOtherAssets = false;
    }
    if(inOtherAssets && lbl && val){
      if(lbl === '합계'){
        otherAssetEval = num(val);
      } else {
        otherAssetsList.push({name: lbl, val: num(val), note: note});
      }
    }
  }

  // 총 자산(금융자산 + 기타자산) 및 순자산 계산
  const totalAssetEval=portfolioEval+otherAssetEval;
  const netAsset=totalAssetEval-totalDebt;

  const setKpi=(id,val,sub,cls='')=>{
    const el=document.getElementById(id);if(el){el.textContent=val;el.className='kpi-value '+cls;}
    const se=document.getElementById(id+'-sub');if(se)se.textContent=sub;
  };
  setKpi('kpi-total',fmt(totalAssetEval),`금융 ${fmt(portfolioEval)} · 기타 ${fmt(otherAssetEval)}`);
  setKpi('kpi-debt',fmt(totalDebt),`월이자 ${fmt(monthlyInt)}`,'neg');
  setKpi('kpi-net',fmt(netAsset),netAsset<0?'전세대출 포함':'부채 차감 후',netAsset<0?'neg':'pos');
  setKpi('kpi-profit',fmt(totalPnl),totalPnl>=0?'평가 수익':'평가 손실',totalPnl>=0?'pos':'neg');
  setKpi('kpi-ret',fmtPct(totalRet*100),'vs 매수금액',totalRet>=0?'pos':'neg');

  renderTreemap(holdings,portfolioEval);
  renderGauges(cfg);
  renderOtherAssets(otherAssetsList, otherAssetEval);
  renderChildren(usdKrw,cfg);
  renderAlloc(holdings,portfolioEval);
  renderHoldings(holdings,portfolioEval);

  // 배당 기록 및 배당 포함 수익률 산출
  const divRecords = parseDividends();
  const totalDiv = divRecords.reduce((s, r) => s + r.amt, 0);
  const totalRetWithDiv = totalBuy > 0 ? (totalPnl + totalDiv) / totalBuy : 0;
  setKpi('kpi-total-ret', fmtPct(totalRetWithDiv * 100), `배당 ${fmt(totalDiv)} 포함`, totalRetWithDiv >= 0 ? 'pos' : 'neg');

  renderDividend(divRecords);
  renderHistory();
}

function renderTreemap(holdings,total){
  const container=document.getElementById('treemap');
  const W=container.offsetWidth||700,H=380;
  const items=holdings.filter(h=>h.eval>0).sort((a,b)=>b.eval-a.eval)
    .map((h,i)=>({...h,value:h.eval,color:COLORS[i%COLORS.length]}));
  if(!items.length){container.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--gray);font-size:0.85rem;font-family:var(--font-mono)">데이터 없음</div>';return;}
  const rects=buildTreemap(items,0,0,W,H);
  container.innerHTML='';container.style.height=H+'px';
  for(const r of rects){
    if(r.w<2||r.h<2)continue;
    const div=document.createElement('div');
    div.className='treemap-cell fade-in';
    div.style.cssText=`left:${r.x}px;top:${r.y}px;width:${r.w}px;height:${r.h}px;background:${r.color}`;
    const pct=total>0?(r.eval/total*100).toFixed(1):'0';
    if(r.w>50&&r.h>35){
      if(r.w>70&&r.h>45){const n=document.createElement('div');n.className='treemap-cell-name';n.textContent=r.w>110?r.name:r.name.substring(0,9)+(r.name.length>9?'…':'');div.appendChild(n);}
      const p=document.createElement('div');p.className='treemap-cell-pct';p.textContent=pct+'%';div.appendChild(p);
      if(r.w>90&&r.h>60){const a=document.createElement('div');a.className='treemap-cell-amt';a.textContent=fmt(r.eval);div.appendChild(a);}
    }
    div.title=`${r.name}\n평가: ${r.eval.toLocaleString()}원\n비중: ${pct}%\n수익률: ${fmtPct(r.ret*100)}`;
    container.appendChild(div);
  }
}

function renderGauges(cfg){
  let pensionAmt=0,isaAmt=0,irpAmt=0,isaExpiry='';
  let sec='';
  for(const row of allData.settings){
    const lbl=(row[1]||'').trim(),val=(row[2]||'').trim();
    if(lbl.includes('연금저축'))sec='pension';
    if(lbl.includes('IRP'))sec='irp';
    if(lbl.includes('ISA'))sec='isa';
    if(lbl==='올해 납입액'&&sec==='pension')pensionAmt=num(val);
    if(lbl==='올해 납입액'&&sec==='isa')isaAmt=num(val);
    if(lbl==='올해 납입액 (IRP)')irpAmt=num(val);
    if(lbl==='만기일')isaExpiry=val;
  }
  const gauges=[
    {label:'연금저축',cur:pensionAmt,limit:6000000,color:'var(--yellow)'},
    {label:'ISA 연간',cur:isaAmt,limit:20000000,color:'var(--purple)'},
    {label:'연금+IRP 합산',cur:pensionAmt+irpAmt,limit:9000000,color:'var(--teal)'},
  ];
  document.getElementById('gauge-area').innerHTML=gauges.map(g=>{
    const pct=Math.min(g.cur/g.limit*100,100);
    return `<div class="gauge-item">
      <div class="gauge-header"><span class="gauge-label">${g.label}</span><span class="gauge-nums" style="color:${g.color}">${fmt(g.cur,'')} <span style="color:var(--gray)">/ ${fmt(g.limit,'')}</span></span></div>
      <div class="gauge-bar-bg"><div class="gauge-bar-fill" style="width:${pct}%;background:${g.color}"></div></div>
      <div style="font-family:var(--font-mono);font-size:0.68rem;color:var(--gray);margin-top:4px">${pct.toFixed(1)}% · 잔여 ${fmt(g.limit-g.cur)}</div>
    </div>`;
  }).join('')+(isaExpiry?`<div style="margin-top:12px;font-family:var(--font-mono);font-size:0.72rem;color:var(--gray)">ISA 만기 <span style="color:var(--purple)">${isaExpiry}</span></div>`:'');
}

// 기타자산 렌더링 카드 모듈
function renderOtherAssets(list, total){
  const area = document.getElementById('other-assets-area');
  if(!area) return;
  if(!list.length){
    area.innerHTML = `<div style="font-family:var(--font-mono);font-size:0.75rem;color:var(--gray);padding:10px 0">등록된 기타 자산 없음</div>`;
    return;
  }
  area.innerHTML = list.map(item => `
    <div class="child-row">
      <div>
        <div class="child-name" style="color:var(--teal)">${item.name}</div>
        <div class="child-gift">${item.note || '-'}</div>
      </div>
      <div class="child-stats">
        <div class="child-stat">
          <span class="child-stat-label">평가금액</span>
          <span class="child-stat-value" style="color:var(--white)">${fmt(item.val)}</span>
        </div>
      </div>
    </div>
  `).join('') + `
    <div style="margin-top:12px;padding-top:12px;border-top:1px dashed var(--border);display:flex;justify-content:space-between;align-items:center;">
      <span style="font-family:var(--font-mono);font-size:0.7rem;color:var(--gray)">기타자산 총합</span>
      <span style="font-family:var(--font-display);font-size:0.92rem;font-weight:700;color:var(--teal)">${fmt(total)}</span>
    </div>
  `;
}

// 실제 자녀 이름(강주호, 강채린) 및 성별 이모지 매핑
function renderChildren(usdKrw,cfg){
  const jh=parseChild(allData.jh,usdKrw,'강주호');
  const cr=parseChild(allData.cr,usdKrw,'강채린');
  let giftA=0,giftB=0;
  
  for(const row of allData.settings){
    const l=(row[1]||'').trim();
    if(l.includes('강주호') && l.includes('증여액')) giftA=num(row[2]);
    if(l.includes('강채린') && l.includes('증여액')) giftB=num(row[2]);
  }
  
  const children = [
    {...jh, gift: giftA, emoji: '👦'},
    {...cr, gift: giftB, emoji: '👧'}
  ];

  document.getElementById('child-area').innerHTML=children.map(c=>`
    <div class="child-row">
      <div>
        <div class="child-name">${c.emoji} ${c.label}</div>
        <div class="child-gift">증여 ${fmt(c.gift)} / 2000만</div>
      </div>
      <div class="child-stats">
        <div class="child-stat"><span class="child-stat-label">평가금액</span><span class="child-stat-value" style="color:var(--teal)">${fmt(c.eval)}</span></div>
        <div class="child-stat"><span class="child-stat-label">수익률</span><span class="child-stat-value ${c.ret>=0?'pos':'neg'}">${fmtPct(c.ret*100)}</span></div>
      </div>
    </div>`).join('');
}

function renderAlloc(holdings,total){
  const accts={};
  for(const h of holdings){if(!accts[h.acct])accts[h.acct]=0;accts[h.acct]+=h.eval;}
  const targets={'연금저축':0.40,'ISA':0.50,'IRP':0.05,'일반':0.05};
  const rows=Object.entries(accts).sort((a,b)=>b[1]-a[1]);
  document.getElementById('alloc-area').innerHTML=
    `<div class="t-row alloc-row hdr"><div>계좌</div><div>금액</div><div>비중</div><div>목표</div><div>상태</div></div>`+
    rows.map(([acct,val])=>{
      const pct=total>0?val/total:0,tgt=targets[acct]||0,diff=pct-tgt;
      const st=Math.abs(diff)<0.03?'✅':diff>0?'⬆':'⬇';
      return `<div class="t-row alloc-row">
        <div><div class="t-name">${acct}</div><span class="badge acct-${acct}">${acct}</span></div>
        <div style="color:var(--teal)">${fmt(val)}</div>
        <div class="${diff>0.03?'pos':diff<-0.03?'neg':'neu'}">${(pct*100).toFixed(1)}%</div>
        <div style="color:var(--gray)">${(tgt*100).toFixed(0)}%</div>
        <div>${st} <span style="font-size:0.68rem;color:var(--gray)">${diff>=0?'+':''}${(diff*100).toFixed(1)}%</span></div>
      </div>`;
    }).join('');
}

function renderHoldings(holdings,total){
  const sorted=[...holdings].sort((a,b)=>b.eval-a.eval);
  document.getElementById('holdings-area').innerHTML=
    `<div class="t-row hold-row hdr"><div>종목</div><div>계좌</div><div>평가금액</div><div>손익</div><div>수익률</div></div>`+
    sorted.map(h=>`
      <div class="t-row hold-row">
        <div><div class="t-name">${h.name}</div><span class="badge acct-${h.acct}" style="font-size:0.6rem;padding:1px 6px">${h.acct}</span></div>
        <div style="color:var(--gray);font-size:0.72rem">${h.ccy}</div>
        <div style="color:var(--teal)">${h.eval>0?fmt(h.eval):'-'}</div>
        <div class="${h.pnl>=0?'pos':'neg'}">${h.eval>0?fmt(h.pnl):'-'}</div>
        <div class="${h.ret>=0?'pos':'neg'}">${h.eval>0?fmtPct(h.ret*100):'-'}</div>
      </div>`).join('');
}

function renderDividend(records){
  const thisYear=String(new Date().getFullYear());
  const totalAll=records.reduce((s,r)=>s+r.amt,0);
  const totalYear=records.filter(r=>r.yr===thisYear).reduce((s,r)=>s+r.amt,0);
  const totalISA=records.filter(r=>r.acct==='ISA').reduce((s,r)=>s+r.amt,0);
  const cntYear=records.filter(r=>r.yr===thisYear).length;

  document.getElementById('div-kpi-area').innerHTML=[
    {label:'올해 배당금',val:fmt(totalYear),color:'var(--green)'},
    {label:'전체 누적',val:fmt(totalAll),color:'var(--teal)'},
    {label:'ISA 배당금',val:fmt(totalISA),color:'var(--purple)'},
    {label:'올해 횟수',val:cntYear+'회',color:'var(--yellow)'},
  ].map(k=>`<div class="div-kpi"><div class="div-kpi-label">${k.label}</div><div class="div-kpi-value" style="color:${k.color}">${k.val}</div></div>`).join('');

  // 연-월별 배당금 집계
  const monthly={};
  for(const r of records){
    const key=r.yr+'-'+r.mo;
    if(!monthly[key])monthly[key]=0;
    monthly[key]+=r.amt;
  }
  
  const monthKeys=Object.keys(monthly).sort().reverse().slice(0,12);
  const maxAmt = Math.max(...Object.values(monthly), 1);

  if (monthKeys.length === 0) {
    document.getElementById('div-history-area').innerHTML = `
      <div style="text-align:center;padding:48px 0;color:var(--gray);font-family:var(--font-mono);font-size:0.85rem">
        배당금 내역 데이터가 존재하지 않거나 연동 준비 중입니다.
      </div>`;
    return;
  }

  document.getElementById('div-history-area').innerHTML=`
    <div class="t-row" style="grid-template-columns:100px 1fr 120px;margin-top:14px;font-family:var(--font-mono);font-size:0.72rem;color:var(--gray);padding-bottom:8px;border-bottom:1px solid var(--border)">
      <div>배당월</div><div>비중 그래프</div><div style="text-align:right">배당금 합계</div>
    </div>`+
    monthKeys.map(k=>{
      const amt=monthly[k];
      const barW=Math.round((amt / maxAmt) * 100);
      return `<div class="t-row" style="grid-template-columns:100px 1fr 120px;align-items:center;padding:10px 0;border-bottom:1px solid rgba(0,180,216,0.06);font-family:var(--font-mono);font-size:0.78rem">
        <div style="color:var(--teal);font-weight:600">${k}</div>
        <div style="padding:0 12px">
          <div style="height:6px;background:rgba(255,255,255,0.06);overflow:hidden">
            <div style="height:100%;width:${barW}%;background:var(--green);transition:width 0.8s"></div>
          </div>
        </div>
        <div style="color:var(--green);text-align:right;font-weight:600">${fmt(amt)}</div>
      </div>`;
    }).join('');
}

function renderHistory(){
  let hdr=false;const data=[];
  for(const row of allData.snap){
    if((row[1]||'').includes('분기')&&(row[2]||'').includes('총자산')){hdr=true;continue;}
    if(!hdr)continue;
    const q=row[1];if(!q||!q.match(/\d{4}-Q\d/))continue;
    data.push({q,total:num(row[2]),debt:num(row[3]),net:num(row[4]),qoq:row[5]||''});
  }
  document.getElementById('history-area').innerHTML=
    `<div class="t-row hist-row hdr"><div>분기</div><div>총자산</div><div>총부채</div><div>순자산</div><div>전분기비</div></div>`+
    data.map(r=>`
      <div class="t-row hist-row">
        <div style="color:var(--teal);font-weight:600">${r.q}</div>
        <div>${r.total?fmt(r.total):'<span style="color:var(--gray)">-</span>'}</div>
        <div>${r.debt?'<span class="neg">'+fmt(r.debt)+'</span>':'<span style="color:var(--gray)">-</span>'}</div>
        <div>${r.net?fmt(r.net):'<span style="color:var(--gray)">-</span>'}</div>
        <div>${r.qoq&&r.qoq!=='-'?'<span class="'+(r.qoq.includes('-')?'neg':'pos')+'">'+r.qoq+'</span>':'<span class="neu">-</span>'}</div>
      </div>`).join('');
}

loadAll();
